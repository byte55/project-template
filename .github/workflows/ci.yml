name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token: this workflow only needs to read the repo.
permissions:
  contents: read

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/app
      TEST_DATABASE_URL: postgresql://app:app@localhost:5432/app_test
      BETTER_AUTH_SECRET: ci-test-secret
      BETTER_AUTH_URL: http://localhost:4000
      WEB_URL: http://localhost:3100

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          # pnpm is provided via corepack in the next step, so disable
          # setup-node's auto package-manager cache (it runs before pnpm exists).
          package-manager-cache: false

      # pnpm via corepack (as in the Dockerfiles)
      - run: corepack enable && corepack install

      - run: pnpm install

      # Lint + formatting (no database needed)
      - run: pnpm exec eslint .
      - run: pnpm exec prettier --check .

      # Create the test database
      - run: |
          node --input-type=module -e "import postgres from 'postgres';const p=postgres('$DATABASE_URL');p.unsafe('CREATE DATABASE app_test').then(()=>p.end()).catch(e=>{if(e.code==='42P04')p.end();else{console.error(e);process.exit(1)}})"
        working-directory: packages/db

      # Push schema to both databases
      - run: pnpm --filter @app/db exec drizzle-kit push
      - run: DATABASE_URL=$TEST_DATABASE_URL pnpm --filter @app/db exec drizzle-kit push

      # Type check
      - run: pnpm --filter @app/api exec tsc --noEmit
      - run: pnpm --filter @app/web exec tsc --noEmit

      # Tests
      - run: pnpm --filter @app/api test
      - run: pnpm --filter @app/web test

  # Verify the production Dockerfiles still build (they aren't exercised by the
  # dev stack, so they can rot silently otherwise).
  build-prod-images:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Build API production image
        run: docker build -f Dockerfile.api.prod -t api-prod .

      - name: Build Web production image
        run: docker build -f Dockerfile.web.prod -t web-prod .
