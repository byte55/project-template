name: Bug report
description: Report something that isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps (commands, requests, UI actions) to reproduce the behavior.
      placeholder: |
        1. task up
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, and anything else relevant.
      placeholder: |
        - OS:
        - Docker:
        - Commit / version:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (`task logs:api` / `task logs:web`). This is automatically formatted as code.
      render: shell
    validations:
      required: false
