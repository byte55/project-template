services:
  postgres:
    image: postgres:17-alpine
    container_name: app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: app-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    networks:
      - default

  api:
    build:
      context: .
      dockerfile: Dockerfile.api.prod
    container_name: app-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-app}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      API_PORT: 4000
      WEB_URL: https://${WEB_DOMAIN}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://${API_DOMAIN}
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.app-api.entrypoints=websecure"
      - "traefik.http.routers.app-api.tls=true"
      - "traefik.http.services.app-api.loadbalancer.server.port=4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: Dockerfile.web.prod
      args:
        NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
    container_name: app-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${API_DOMAIN}
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-web.rule=Host(`${WEB_DOMAIN}`)"
      - "traefik.http.routers.app-web.entrypoints=websecure"
      - "traefik.http.routers.app-web.tls=true"
      - "traefik.http.services.app-web.loadbalancer.server.port=3000"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:

networks:
  default:
    driver: bridge
  traefik:
    external: true
